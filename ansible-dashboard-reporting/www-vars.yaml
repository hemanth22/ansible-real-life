---
# Dashboard metadata for index.html generation
# Format: filename: description

dashboards:
  demo-dashboard.html:
    title: "OS Patching Workflow Dashboard"
    description: "Real-time patching workflow with task status, progress tracking, and error handling for APP-DB-MQ cluster"
    category: "Operations"
    template: "patching_workflow_dashboard.html"

  compliance-main-dashboard.html:
    title: "Security Compliance Overview"
    description: "OpenSCAP compliance dashboard showing overall security posture across infrastructure"
    category: "Security & Compliance"
    template: "compliance_main_dashboard.html"

  compliance-server-details.html:
    title: "Server Compliance Details"
    description: "Detailed compliance status per server with rule-level breakdown and remediation links"
    category: "Security & Compliance"
    template: "compliance_server_details.html"

  compliance-remediation-tracker.html:
    title: "Compliance Remediation Tracker"
    description: "Track remediation progress, priorities, and responsible teams for compliance violations"
    category: "Security & Compliance"
    template: "compliance_remediation_tracker.html"

  compliance-exceptions.html:
    title: "Compliance Exceptions Management"
    description: "Manage approved compliance exceptions, risk assessments, and expiration tracking"
    category: "Security & Compliance"
    template: "compliance_exceptions.html"

  ocp-health-check-report.html:
    title: "OCP Health Check Report"
    description: "Cluster health check showing nodes, API/DNS/ingress/registry/logging/auth/monitoring pods, and cluster configurations"
    category: "OpenShift Operations"
    type: report
    template: "ocp_health_check_report.html"

  ocp-health-check-extended-report.html:
    title: "OCP Extended Health Check Report"
    description: "Extended health check with persistent volumes, storage usage, SSL certificates, API encryption, and self-provisioning status"
    category: "OpenShift Operations"
    type: report
    template: "ocp_health_check_ext_report.html"

  ocp-rbac-audit-report.html:
    title: "OCP RBAC Audit Report"
    description: "ClusterRoleBinding audit showing users, groups, and service accounts across all RBAC bindings"
    category: "OpenShift Operations"
    type: report
    template: "ocp_rbac_check_report.html"

  ocp-ssl-certificate-report.html:
    title: "OCP SSL Certificate Report"
    description: "SSL certificate expiry tracking with validity checks at 30-day and 12-week thresholds"
    category: "OpenShift Operations"
    type: report
    template: "ocp_ssl_check_report.html"

  ocp-project-onboarding-report.html:
    title: "OCP Project Onboarding Report"
    description: "Project onboarding status report with full resource details - CPU, memory, storage, egress, RBAC, and contacts"
    category: "OpenShift Operations"
    type: report
    template: "ocp_onboarding_report.html"

  ocp-operation-report.html:
    title: "OCP Resource Operation Report"
    description: "Email-style notification for RBAC/Quota/NetworkPolicy create and update operations with request details"
    category: "OpenShift Operations"
    type: report
    template: "ocp_operation_report.html"

# Site metadata
site:
  title: "Ansible Dashboards and Reports Gallery"
  subtitle: "Production-ready dashboards and report templates for Ansible Automation Platform"
  author: "Gineesh Madapparambath"
  author_url: "https://gineesh.com"
  github_repo: "https://github.com/iamgini/ansible-real-life/tree/main/ansible-dashboard-reporting"
  year: 2024
